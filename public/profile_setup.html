<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile Setup - MTG Stats</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <h1>Complete Your Profile</h1>
    <p>Please add your required player name and any optional contact info.</p>

    <form action="/profile-setup" method="POST">
      <p>
        <label for="player_name">Player Name (required):</label>
        <input type="text" id="player_name" name="player_name" required>
      </p>

      <p>
        <label for="deckbuilding_link">Deckbuilding Site Link (optional):</label>
        <input
          type="url"
          id="deckbuilding_link"
          name="deckbuilding_link"
          placeholder="https://moxfield.com/..."
        >
      </p>

      <p>
        <label for="discord_contact">Discord Username (Optional):</label>
        <input
          type="text"
          id="discord_contact"
          name="discord_contact"
          placeholder="username or username#1234"
        >
      </p>

      <input type="submit" value="Save Profile">
    </form>
  </main>
</body>
</html>
