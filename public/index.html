<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MTG Stats</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <h1>MTG Stats</h1>
    <p>Select a page to view different parts of the site.</p>

    <nav class="nav-grid">
      <a class="players-link" href="/players.html">Players</a>
      <a class="deck-link" href="/decks.html">Decks</a>
      <a class="match-link" href="/matches.html">Matches</a>
      <a class="scoreboard-link" href="/leaderboard.html">Leaderboard</a>
      <a class="stat-link" href="/stats.html">Stats</a>
      <a class="sign-link" href="/sign.html"><u>Add a Game here!</u></a>
      <a class="profile-link" href="/profile.html">Profile</a>
    </nav>
  </main>

  <script>
async function handleProfileClick(event) {
  event.preventDefault();

  try {
    const res = await fetch("/api/me");
    const data = await res.json();

    if (data.success && data.user) {
      // user is logged in
      window.location.href = "/profile.html";
    } else {
      // not logged in
      window.location.href = "/sign.html";
    }
  } catch (error) {
    console.error("Error checking login:", error);
    window.location.href = "/sign.html";
  }
}

document.getElementById("profile-link")
  .addEventListener("click", handleProfileClick);
</script>

</body>
</html>
