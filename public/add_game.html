<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Game - MTG Stats</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <h1>Create a Game</h1>
    <p>Create a new match, choose your seat, and get a game ID for other players to join.</p>

    <form action="/add-game" method="POST" onsubmit="return validateCreateGameForm()">
      <p>
        <label for="player_count">Number of Players:</label>
        <input type="number" name="player_count" id="player_count" min="2" max="8" required>
      </p>

      <p>
        <label for="player_num">Your Player #:</label>
        <select name="player_num" id="player_num" required>
          <option value="">Select a #</option>
          <option value="1">Player 1</option>
          <option value="2">Player 2</option>
          <option value="3">Player 3</option>
          <option value="4">Player 4</option>
          <option value="5">Player 5</option>
          <option value="6">Player 6</option>
          <option value="7">Player 7</option>
          <option value="8">Player 8</option>
        </select>
      </p>

      <p>
        <label for="deck_name">Deck Name:</label>
        <input type="text" name="deck_name" id="deck_name">
        <label for="commander">Or Commander:</label>
        <input type="text" name="commander" id="commander">
      </p>

      <p>
        <label for="format">Format:</label>
        <select name="format" id="format">
          <option value="Commander">Commander</option>
          <option value="cEDH">cEDH</option>
        </select>
      </p>

      <p>
        <label for="result">Your Result:</label>
        <select name="result" id="result" required>
          <option value="">Select a result</option>
          <option value="win">Win</option>
          <option value="loss">Loss</option>
          <option value="draw">Draw</option>
        </select>
      </p>

      <p>
        <label for="location">Location:</label>
        <input type="text" name="location" id="location">
      </p>

      <p>
        <label for="notes">Notes:</label>
        <textarea name="notes" id="notes" rows="4"></textarea>
      </p>

      <input type="submit" value="Create Game">
    </form>

    <hr>

    <p>
      Already have a game ID?
      <a href="/join_game.html">Join a game here</a>
    </p>

    <p>
      <a href="/logout" onclick="event.preventDefault(); document.getElementById('logout-form').submit();">Log out</a>
    </p>

    <form id="logout-form" action="/logout" method="POST" style="display:none;"></form>
  </main>

  <script>
    function validateCreateGameForm() {
      const playerCount = Number(document.getElementById("player_count").value);
      const playerNum = Number(document.getElementById("player_num").value);
      const deck = document.getElementById("deck_name").value.trim();
      const commander = document.getElementById("commander").value.trim();
      const result = document.getElementById("result").value;

      if (!Number.isInteger(playerCount) || playerCount < 2) {
        alert("Please enter a valid number of players.");
        return false;
      }

      if (!Number.isInteger(playerNum) || playerNum < 1 || playerNum > playerCount) {
        alert("Please choose a valid player number for this game.");
        return false;
      }

      if (!deck && !commander) {
        alert("Please enter either a Deck Name or a Commander.");
        return false;
      }

      if (!result) {
        alert("Please choose a result.");
        return false;
      }

      return true;
    }
  </script>
</body>
</html>
