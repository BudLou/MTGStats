<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Add Game - MTG Stats</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <h1>Add a Game</h1>
    <p>Log a match result for your linked player profile.</p>

    <form action="/add-game" method="POST" onsubmit="return validateDeckOrCommander()">
      <p>
        <label for="player_count">Number of Players:</label>
        <input type="text" name="player_count" id="player_count">
        <label for="player_num">Player #:</label>
        <select name="player_num" id="player_num">
          <option value="">Select a #</option>
          <option value="Player 1">Player 1</option>
          <option value="Player 2">Player 2</option>
          <option value="Player 3">Player 3</option>
          <option value="Player 4">Player 4</option>
        </select>
      </p>

      <p>
        <label for="deck_name">Deck Name:</label>
        <input type="text" name="deck_name" id="deck_name">
        <label for="commander">Or Commander:</label>
        <input type="text" name="commander" id="commander">
      </p>

      <p>
        <label for="deck_link">Deck Link:</label>
        <input type="link" name="deck_link" id="deck_link">
        <label for="deck_link">(Optional)</label>
      </p>

      <p>
        <label for="format">Format:</label>
        <select name="format" id="format">
          <option value="">Select a format</option>
          <option value="commander">Commander</option>
          <option value="cedh">cEDH</option>
        </select>
      </p>

      <p>
        <label for="result">Player Result:</label>
        <select name="result" id="result" required>
          <option value="">Select a result</option>
          <option value="win">Win</option>
          <option value="loss">Loss</option>
          <option value="draw">Draw</option>
        </select>
      </p>

      <p>
        <label for="location">Location:</label>
        <input type="text" name="location" id="location">
      </p>

      <p>
        <label for="notes">Notes:</label>
        <textarea name="notes" id="notes" rows="4"></textarea>
      </p>

      <input type="submit" value="Log Game">
    </form>

    <p>
      <a href="/logout" onclick="event.preventDefault(); document.getElementById('logout-form').submit();">Log out</a>
    </p>

    <form id="logout-form" action="/logout" method="POST" style="display:none;"></form>
  </main>

  <script>
    function validateDeckOrCommander() {
      const deck = document.getElementById("deck_name").value.trim();
      const commander = document.getElementById("commander").value.trim();

      if (!deck && !commander) {
        alert("Please enter either a Deck Name or a Commander.");
        return false;
      }

      return true;
    }
  </script>

</body>
</html>
