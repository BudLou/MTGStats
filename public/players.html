<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Players - MTG Stats</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main>
    <h1>Player Leaderboard</h1>
    <p>Players ranked by Win Rate.</p>

    <div id="players-list">
      <p>Loading players...</p>
    </div>

    <p class="nav-bar">
      <a href="/index.html">Home</a> |
      <a href="/profile.html">Profile</a> |
      <a href="/add_game.html">Create Game</a> |
      <a href="/join_game.html">Join Game</a>
    </p>
  </main>

  <script>
    function escapeHtml(value) {
      return String(value)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function renderPlayers(players) {
      const container = document.getElementById("players-list");

      if (!players || players.length === 0) {
        container.innerHTML = "<p>No players found.</p>";
        return;
      }

      container.innerHTML = `
      <table class="leaderboard">
        <thead>
          <tr>
            <th>#</th>
            <th>Player</th>
            <th>Games</th>
            <th>Wins</th>
            <th>Losses</th>
            <th>Win %</th>
            <th>Loss %</th>
          </tr>
        </thead>
        <tbody>
          ${players.map((player, index) => {
            const name = player.deckbuilding_link
              ? `<a href="${escapeHtml(player.deckbuilding_link)}" target="_blank">${escapeHtml(player.name)}</a>`
              : escapeHtml(player.name);

            return `
              <tr>
                <td>${index + 1}</td>
                <td>${name}</td>
                <td>${player.total_games}</td>
                <td>${player.wins}</td>
                <td>${player.losses}</td>
                <td>${Number(player.win_rate).toFixed(1)}%</td>
                <td>${Number(player.loss_rate).toFixed(1)}%</td>
              </tr>
            `;
          }).join("")}
        </tbody>
      </table>
    `;
  }

    async function loadPlayers() {
      const container = document.getElementById("players-list");
      container.innerHTML = "<p>Loading players...</p>";

      try {
        const res = await fetch("/api/players");
        const data = await res.json();

        if (!data.success) {
          container.innerHTML = "<p>Failed to load players.</p>";
          return;
        }

        renderPlayers(data.players);
      } catch (error) {
        console.error("Error loading players:", error);
        container.innerHTML = "<p>Failed to load players.</p>";
      }
    }

    loadPlayers();
  </script>
</body>
</html>
